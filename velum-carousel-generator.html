<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velum Carousel Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#0F2F26;--fl:#1a4a3a;--ch:#111111;--cr:#F2EFE7;--sg:#6F8A7E;--gd:#C9A84C;--mt:#c8c4bb;--dm:#9aaea3;--br:#222;--sf:#181818;--s2:#1e1e1e}
html,body{height:100%;background:#0d0d0d;color:var(--cr);font-family:'DM Sans',sans-serif;font-weight:300}
.app{display:grid;grid-template-columns:340px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--br);background:#0d0d0d}
.logo{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;letter-spacing:.35em;color:var(--cr);opacity:.8}
.logo span{color:var(--gd)}
.htag{font-size:10px;font-weight:400;letter-spacing:.2em;color:var(--sg);text-transform:uppercase}
.sidebar{border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;background:var(--sf)}
.si{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.si::-webkit-scrollbar{width:4px}
.si::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
label{display:block;font-size:10px;font-weight:400;letter-spacing:.2em;color:var(--sg);text-transform:uppercase;margin-bottom:7px}
textarea,select,input{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:4px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:10px 12px;outline:none;resize:none;transition:border-color .2s}
textarea:focus,select:focus,input:focus{border-color:var(--gd)}
textarea{line-height:1.6}
select{cursor:pointer;appearance:none}
select option{background:#1e1e1e}
.sw{position:relative}
.sw::after{content:'v';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--sg);font-size:11px;pointer-events:none}
.mt{display:flex;border:1px solid var(--br);border-radius:4px;overflow:hidden}
.mb{flex:1;padding:9px 0;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s}
.mb.on{background:var(--gd);color:var(--ch);font-weight:500}
.mb.off{background:var(--s2);color:var(--sg);font-weight:400}
.gbtn{width:100%;background:var(--gd);color:var(--ch);border:none;border-radius:3px;padding:12px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.gbtn:hover{opacity:.88}
.ftbar{position:fixed;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:4px 6px;display:none;gap:4px;align-items:center;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.ftbar button{background:none;border:none;color:#c8c4bb;cursor:pointer;font-size:13px;padding:4px 7px;border-radius:3px;font-family:'DM Sans',sans-serif}
.ftbar button:hover{background:#333;color:#F2EFE7}
.ftbar .sep{width:1px;height:16px;background:#333}
.ftbar input[type=color]{width:22px;height:22px;border:none;background:none;cursor:pointer;padding:0}
.dload-btn{background:transparent;border:1px solid #222;border-radius:3px;color:#6F8A7E;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;cursor:pointer;transition:border-color .2s,color .2s;width:100%}
.dload-btn:hover{border-color:#C9A84C;color:#C9A84C}
.logo-preview{width:100%;height:48px;border:1px dashed #333;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6F8A7E;font-size:11px;letter-spacing:.1em;position:relative;overflow:hidden}
.logo-preview img{max-height:36px;max-width:140px;object-fit:contain}

.gbtn:disabled{opacity:.35;cursor:default}
.div{border:none;border-top:1px solid var(--br)}
.hint{font-size:10px;color:var(--sg);margin-top:7px;line-height:1.6;opacity:.8}
.slist{display:flex;flex-direction:column;gap:10px}
.secard{background:var(--s2);border:1px solid var(--br);border-radius:6px;overflow:hidden}
.sehdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:border-color .2s}
.sehdr:hover,.sehdr.open{border-bottom-color:var(--br)}
.snum{font-size:10px;font-weight:400;letter-spacing:.15em;color:var(--gd);text-transform:uppercase}
.stlbl{font-size:11px;color:var(--dm)}
.chv{font-size:10px;color:var(--sg);transition:transform .2s}
.chv.open{transform:rotate(180deg)}
.sebdy{display:none;padding:14px;flex-direction:column;gap:10px}
.sebdy.open{display:flex}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{margin-bottom:0}
.rbtn{background:transparent;border:1px solid var(--br);border-radius:3px;color:var(--sg);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:border-color .2s,color .2s;align-self:flex-start}
.rbtn:hover{border-color:var(--gd);color:var(--gd)}
.sbar{padding:12px 20px;border-top:1px solid var(--br);font-size:11px;color:var(--sg);min-height:42px;display:flex;align-items:center;gap:8px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--sg);flex-shrink:0}
.sdot.on{background:var(--gd);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.canvas{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;overflow:auto;padding:40px;background:#0d0d0d}
.sc{position:relative;width:480px;height:480px;flex-shrink:0;border-radius:2px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.05),0 24px 80px rgba(0,0,0,.7)}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:44px;background:var(--ch)}
.slide.active{display:flex}
.cm{position:absolute;top:18px;right:20px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;color:var(--sg);letter-spacing:.08em;opacity:.6}
.wm{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:300;letter-spacing:.32em;color:var(--sg);opacity:.5;white-space:nowrap}
.sey{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:var(--gd);margin-bottom:18px;position:relative;text-align:center}
.shl{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1.15;color:var(--cr);text-align:center;position:relative;max-width:350px}
.shl em{font-style:italic;color:var(--gd)}
.srl{width:28px;height:1px;background:var(--gd);margin:22px auto 0;opacity:.6;position:relative}
.sst{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:.12em;color:var(--sg);text-align:center;margin-top:12px;position:relative}
.sbd{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;line-height:1.8;color:var(--mt);text-align:center;max-width:340px;position:relative}
.set{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:.25em;color:var(--gd);text-transform:uppercase;margin-bottom:6px;position:relative}
.sen{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--cr);margin-bottom:4px;position:relative}
.ses{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;letter-spacing:.1em;color:var(--sg);margin-bottom:22px;position:relative}
.sch{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:300;font-style:italic;line-height:1.3;color:var(--cr);text-align:center;max-width:310px;margin-bottom:18px;position:relative}
.scb{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;line-height:1.75;color:var(--dm);text-align:center;max-width:290px;margin-bottom:26px;position:relative}
.sln{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:.18em;color:var(--gd);text-transform:uppercase;position:relative}
.snav{display:flex;align-items:center;gap:14px}
.nb{width:34px;height:34px;border-radius:50%;border:1px solid var(--br);background:var(--sf);color:var(--cr);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.nb:hover{border-color:var(--gd)}
.nb:disabled{opacity:.2;cursor:default}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#333;cursor:pointer;transition:background .2s,width .2s}
.dot.active{background:var(--gd);width:14px;border-radius:3px}
.sct{font-size:11px;color:var(--sg);letter-spacing:.1em;min-width:36px;text-align:center}
.es{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.eg{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--fl);line-height:1}
.et{font-size:12px;color:var(--sg);letter-spacing:.05em;line-height:1.7;max-width:260px}
.bgr{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#1a4a3a 0%,#111111 70%)}
.bgl{position:absolute;inset:0;background:linear-gradient(155deg,#0F2F26 0%,#111111 55%)}
.bfg{display:flex;gap:24px;align-items:flex-end;position:relative}
.bfc{display:flex;flex-direction:column;align-items:center;gap:8px}
.bfl{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:400;letter-spacing:.15em}
.bfl.s{color:#c97c5c}
.bfl.c{color:var(--sg)}
.dv{width:1px;height:44px;background:#2a2a2a;align-self:center}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">V<span>E</span>LUM</div>
  <div class="htag">Carousel Generator</div>
</header>
<aside class="sidebar">
  <div class="si">
    <div>
      <label>Anthropic API key</label>
      <input type="password" id="akey" placeholder="sk-ant-..." autocomplete="off">
      <div class="hint">Stays in memory only.</div>
    </div>
    <hr class="div">
    <div class="mt">
      <button class="mb on" id="mg" onclick="setMode('gen')">Generate</button>
      <button class="mb off" id="ms" onclick="setMode('script')">My Script</button>
    </div>
    <div id="gf">
      <div style="margin-bottom:14px">
        <label>Topic</label>
        <textarea id="topic" placeholder="e.g. 3 signs your nervous system is dysregulated" rows="3"></textarea>
      </div>
      <div style="margin-bottom:14px">
        <label>Angle</label>
        <div class="sw">
          <select id="angle">
            <option value="educational">Educational</option>
            <option value="howto">How-to</option>
            <option value="myth">Myth-busting</option>
            <option value="signs">Signs / symptoms</option>
            <option value="benefits">Benefits</option>
            <option value="story">Story-led</option>
          </select>
        </div>
      </div>
      <div>
        <label>Slides</label>
        <div class="sw">
          <select id="scount">
            <option value="4">4 slides</option>
            <option value="5">5 slides</option>
            <option value="6" selected>6 slides</option>
            <option value="7">7 slides</option>
            <option value="8">8 slides</option>
          </select>
        </div>
      </div>
    </div>
    <div id="sf" style="display:none">
      <label>Paste your full script</label>
      <textarea id="script" placeholder="Paste your slide-by-slide brief here. Claude will use your exact words and technique names." rows="12"></textarea>
      <div class="hint">Your words, your structure -- formatted into Velum slides.</div>
    </div>
    <button class="gbtn" id="gbtn" onclick="go()">Generate Carousel</button>
    <hr class="div">
    <div id="editors" class="slist" style="display:none"></div>
  </div>
  <div class="sbar">
    <div class="sdot" id="sdot"></div>
    <span id="stxt">Ready -- enter a topic or paste your script</span>
  </div>

<hr class="div">
<div>
  <label>Logo</label>
  <div class="logo-preview" id="logo-preview" onclick="document.getElementById('logo-file').click()">
    <span id="logo-hint">+ Upload logo</span>
    <img id="logo-img" style="display:none">
  </div>
  <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="loadLogo(this)">
</div>
<button class="dload-btn" onclick="dlAll()">↓ Download all slides</button>
</aside>
<main class="canvas" id="canvas">
  <div class="es" id="empty">
    <div class="eg">O</div>
    <div class="et">Enter a topic or paste your script, then hit Generate.</div>
  </div>
</main>

<div class="ftbar" id="ftbar">
  <button onclick="fmt('bold')" title="Bold"><b>B</b></button>
  <button onclick="fmt('italic')" title="Italic"><i>I</i></button>
  <button onclick="fmt('underline')" title="Underline"><u>U</u></button>
  <div class="sep"></div>
  <input type="color" id="ftcolor" value="#C9A84C" onchange="fmt('foreColor',this.value)" title="Text color">
  <button onclick="fmt('removeFormat')" title="Clear">✕</button>
</div>
</div>
<script>
const AAPI='https://api.anthropic.com/v1/messages';
let slides=[],cur=0,mode='gen';

function setMode(m){
  mode=m;
  document.getElementById('gf').style.display=m==='gen'?'block':'none';
  document.getElementById('sf').style.display=m==='script'?'block':'none';
  document.getElementById('mg').className='mb '+(m==='gen'?'on':'off');
  document.getElementById('ms').className='mb '+(m==='script'?'on':'off');
  document.getElementById('gbtn').textContent=m==='script'?'Format My Script':'Generate Carousel';
}

function st(txt,active=false){
  document.getElementById('stxt').textContent=txt;
  document.getElementById('sdot').className='sdot'+(active?' on':'');
}

async function api(sys,usr){
  const key=document.getElementById('akey').value.trim();if(key)localStorage.setItem('vk',key);
  const r=await fetch(AAPI,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:usr}]})});
  if(!r.ok)throw new Error('API error '+r.status);
  const d=await r.json();return d.content[0].text;
}

const BRAND=`You write Instagram carousel copy for Velum, a wellness app for nervous system regulation, breathwork, meditation, EFT tapping, somatic practices, and self-hypnosis. Voice: quiet, introspective, slightly philosophical. Serious and effective. No fluff, no generic warmth, no motivational cliches.`;
const SCH=`Respond with ONLY a valid JSON array. No preamble, no backticks.
Slide types:
- "hook": {eyebrow, headline, subtext}
- "why": {body, graphic:"wave"}
- "exercise": {num, name, subtitle, graphic:"box"|"wave478"|"circle"|"wave"}
- "concept": {eyebrow, headline, body}
- "cta": {headline, body, nudge:"link in bio"}
Rules: first=hook, last=cta. Short copy (480x480 slides). App has breathwork, guided meditation, EFT tapping, somatic practices, self-hypnosis only.`;
const SCH1=`Respond with ONLY a valid JSON object for one slide. No preamble, no backticks.
Types: hook={eyebrow,headline,subtext}, why={body,graphic:"wave"}, exercise={num,name,subtitle,graphic:"box"|"wave478"|"circle"|"wave"}, concept={eyebrow,headline,body}, cta={headline,body,nudge:"link in bio"}`;

async function go(){
  const key=document.getElementById('akey').value.trim();if(key)localStorage.setItem('vk',key);
  if(!key){st('Paste your API key first.');return;}
  const btn=document.getElementById('gbtn');btn.disabled=true;
  try{
    let raw;
    if(mode==='script'){
      const sc=document.getElementById('script').value.trim();
      if(!sc){st('Paste your script first.');btn.disabled=false;return;}
      st('Formatting your script...',true);
      raw=await api(BRAND+'\n\nTake the user\'s raw script and map it FAITHFULLY into the carousel JSON format. Use their EXACT words, technique names, and instructions verbatim. Do not rewrite or improve -- just format.\n\n'+SCH,'Map this script into the carousel JSON using my exact words:\n\n'+sc);
    }else{
      const topic=document.getElementById('topic').value.trim();
      if(!topic){st('Enter a topic first.');btn.disabled=false;return;}
      const count=parseInt(document.getElementById('scount').value);
      const ang=document.getElementById('angle').value;
      const amap={educational:'teach the concept clearly',howto:'step-by-step guide',myth:'myth-busting',signs:'signs and symptoms awareness',benefits:'why it matters',story:'story arc from struggle to insight'};
      st('Generating carousel...',true);
      raw=await api(BRAND+'\n\n'+SCH,`Topic: "${topic}"\nAngle: ${amap[ang]}\nSlides: ${count}\n\nGenerate ${count} slides.`);
    }
    const clean=raw.replace(/```json|```/g,'').trim();
    slides=JSON.parse(clean);cur=0;
    render();renderEds();
    st(`${slides.length} slides ready -- click any text to edit`,false);
  }catch(e){st('Error: '+e.message,false);console.error(e);}
  btn.disabled=false;
}

async function regen(idx){
  const key=document.getElementById('akey').value.trim();if(key)localStorage.setItem('vk',key);
  if(!key){st('Paste your API key first.');return;}
  const s=slides[idx];
  const topic=document.getElementById('topic').value.trim()||'the current topic';
  st('Regenerating slide '+(idx+1)+'...',true);
  try{
    const raw=await api(BRAND+'\n\n'+SCH1,`Regenerate this slide (type:"${s.type}") for topic:"${topic}". Fresh take.`);
    const ns=JSON.parse(raw.replace(/```json|```/g,'').trim());
    ns.type=s.type;slides[idx]=ns;
    render();renderEds();goTo(idx);
    st('Slide '+(idx+1)+' regenerated',false);
  }catch(e){st('Regen error: '+e.message,false);}
}

function render(){
  const cv=document.getElementById('canvas');
  document.getElementById('empty')?.remove();
  cv.querySelectorAll('.sc,.snav,.sct').forEach(e=>e.remove());
  const c=document.createElement('div');c.className='sc';
  slides.forEach((s,i)=>{const el=bslide(s,i);if(i===cur)el.classList.add('active');c.appendChild(el);});
  cv.appendChild(c);
  const nav=document.createElement('div');nav.className='snav';
  nav.innerHTML=`<button class="nb" id="pb" onclick="mv(-1)" ${cur===0?'disabled':''}>&#8592;</button><div class="dots" id="dots"></div><button class="nb" id="nb2" onclick="mv(1)" ${cur===slides.length-1?'disabled':''}>&#8594;</button>`;
  cv.appendChild(nav);
  const ct=document.createElement('div');ct.className='sct';ct.id='sct';ct.textContent=`${cur+1} of ${slides.length}`;
  cv.appendChild(ct);
  bdots();
}

function bslide(s,i){
  const el=document.createElement('div');el.className='slide';el.id='sl'+i;
  const cm=`<div class="cm">${String(i+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</div>`;
  const wm=`<div class="wm">V E L U M</div>`;
  const t=s.type;let inner='';
  if(t==='hook')inner=`<div class="bgr"></div>${cm}<div class="sey" contenteditable="true">${s.eyebrow||'breathwork'}</div><div class="shl" contenteditable="true">${s.headline||''}</div><div class="srl"></div><div class="sst" contenteditable="true">${s.subtext||''}</div>${wm}`;
  else if(t==='why')inner=`${cm}<div class="sbd" contenteditable="true" style="margin-bottom:28px">${s.body||''}</div>${gfx('wave')}${wm}`;
  else if(t==='exercise')inner=`${cm}<div class="set" contenteditable="true">Exercise ${s.num||String(i).padStart(2,'0')}</div><div class="sen" contenteditable="true">${s.name||''}</div><div class="ses" contenteditable="true">${s.subtitle||''}</div>${gfx(s.graphic)}${wm}`;
  else if(t==='concept')inner=`${cm}<div class="sey" contenteditable="true">${s.eyebrow||''}</div><div class="shl" style="font-size:26px" contenteditable="true">${s.headline||''}</div><div class="srl"></div><div class="sbd" style="margin-top:16px;font-size:12.5px" contenteditable="true">${s.body||''}</div>${wm}`;
  else if(t==='cta')inner=`<div class="bgl"></div>${cm}<div class="sey" contenteditable="true">go deeper</div><div class="sch" contenteditable="true">${s.headline||''}</div><div class="scb" contenteditable="true">${s.body||''}</div><div class="sln">&#8593; link in bio</div>${wm}`;
  else inner=`${cm}<div class="sbd" contenteditable="true">${s.headline||s.body||''}</div>${wm}`;
  el.innerHTML=inner;return el;
}

function gfx(t){
  if(t==='wave')return`<div class="bfg"><div class="bfc"><div class="bfl s">STRESS BREATH</div><svg width="110" height="44" viewBox="0 0 110 44"><polyline points="0,22 7,9 13,33 19,11 25,35 30,7 36,31 41,13 47,37 53,9 59,29 64,14 70,35 75,11 81,33 87,13 93,35 99,16 105,31 110,20" fill="none" stroke="#c97c5c" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="dv"></div><div class="bfc"><div class="bfl c">CALM BREATH</div><svg width="110" height="44" viewBox="0 0 110 44"><path d="M0,28 C18,28 28,6 55,6 C82,6 92,28 110,28" fill="none" stroke="#6F8A7E" stroke-width="1.4" stroke-linecap="round"/></svg></div></div>`;

function renderEds(){
  const c=document.getElementById('editors');c.style.display='flex';c.innerHTML='';
  const lbl={hook:'Hook',why:'Why it works',exercise:'Exercise',concept:'Concept',cta:'Call to action'};
  const defs={hook:[['eyebrow','Eyebrow'],['headline','Headline'],['subtext','Subtext']],why:[['body','Body copy']],exercise:[['num','#'],['name','Name'],['subtitle','Subtitle']],concept:[['eyebrow','Eyebrow'],['headline','Headline'],['body','Body copy']],cta:[['headline','Headline'],['body','Body copy']]};
  slides.forEach((s,i)=>{
    const card=document.createElement('div');card.className='secard';
    const fields=(defs[s.type]||[]).map(([k,l])=>{
      const v=(s[k]||'').replace(/"/g,'&quot;');
      const long=k==='body';
      return`<div class="fg"><label>${l}</label>${long?`<textarea rows="3" onchange="upd(${i},'${k}',this.value)">${s[k]||''}</textarea>`:`<input type="text" value="${v}" onchange="upd(${i},'${k}',this.value)">`}</div>`;
    }).join('');
    card.innerHTML=`<div class="sehdr" id="h${i}" onclick="tog(${i})"><span class="snum">Slide ${i+1}</span><span class="stlbl">${lbl[s.type]||s.type}</span><span class="chv" id="c${i}">v</span></div><div class="sebdy" id="b${i}">${fields}<button class="rbtn" onclick="regen(${i})">Regenerate</button></div>`;
    c.appendChild(card);
  });
}

function tog(i){
  const b=document.getElementById('b'+i);const isO=b.classList.contains('open');
  b.classList.toggle('open',!isO);document.getElementById('h'+i).classList.toggle('open',!isO);document.getElementById('c'+i).classList.toggle('open',!isO);
  if(!isO)goTo(i);
}

function upd(idx,key,val){
  slides[idx][key]=val;
  const e=document.getElementById('sl'+idx);
  if(e){const n=bslide(slides[idx],idx);n.id='sl'+idx;if(e.classList.contains('active'))n.classList.add('active');e.replaceWith(n);}
}

function bdots(){
  const d=document.getElementById('dots');if(!d)return;d.innerHTML='';
  slides.forEach((_,i)=>{const dot=document.createElement('div');dot.className='dot'+(i===cur?' active':'');dot.onclick=()=>goTo(i);d.appendChild(dot);});
}

function goTo(n){
  const all=document.querySelectorAll('.slide');const d=document.getElementById('dots');
  if(!all.length||!d)return;
  all[cur].classList.remove('active');d.children[cur]?.classList.remove('active');
  cur=n;all[cur].classList.add('active');d.children[cur]?.classList.add('active');
  document.getElementById('sct').textContent=`${cur+1} of ${slides.length}`;
  document.getElementById('pb').disabled=cur===0;document.getElementById('nb2').disabled=cur===slides.length-1;
}

function mv(dir){const n=cur+dir;if(n>=0&&n<slides.length)goTo(n);}

// Formatting toolbar
let logoDataUrl = null;

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  const tb = document.getElementById('ftbar');
  if (!sel || sel.isCollapsed || !sel.toString()) { tb.style.display='none'; return; }
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  tb.style.display = 'flex';
  tb.style.left = Math.max(8, rect.left + rect.width/2 - 80) + 'px';
  tb.style.top = (rect.top - 48 + window.scrollY) + 'px';
});

function fmt(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('ftbar').style.display = 'none';
}

// Logo
function loadLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoDataUrl = e.target.result;
    const img = document.getElementById('logo-img');
    img.src = logoDataUrl;
    img.style.display = 'block';
    document.getElementById('logo-hint').style.display = 'none';
    updateLogosOnSlides();
  };
  reader.readAsDataURL(file);
}

function updateLogosOnSlides() {
  document.querySelectorAll('.slide-logo').forEach(el => el.remove());
  if (!logoDataUrl) return;
  document.querySelectorAll('.slide').forEach(slide => {
    const img = document.createElement('img');
    img.className = 'slide-logo';
    img.src = logoDataUrl;
    img.style.cssText = 'position:absolute;bottom:32px;right:20px;max-height:28px;max-width:80px;object-fit:contain;opacity:0.8';
    slide.appendChild(img);
  });
}

// Download all slides as PNGs
async function dlAll() {
  if (!slides.length) { alert('Generate a carousel first.'); return; }
  const sc = document.getElementById('carousel');
  if (!sc) return;
  const allSlides = sc.querySelectorAll('.slide');
  
  // Load html2canvas
  if (!window.html2canvas) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const st = document.getElementById('stxt');
  for (let i = 0; i < allSlides.length; i++) {
    st.textContent = `Exporting slide ${i+1} of ${allSlides.length}...`;
    const slide = allSlides[i];
    const wasHidden = !slide.classList.contains('active');
    slide.classList.add('active');
    await new Promise(r => setTimeout(r, 80));
    const canvas = await html2canvas(slide, { scale: 2, useCORS: true, backgroundColor: '#111111', width: 480, height: 480 });
    const a = document.createElement('a');
    a.download = `velum-slide-${String(i+1).padStart(2,'0')}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    await new Promise(r => setTimeout(r, 300));
    if (wasHidden) slide.classList.remove('active');
  }
  // Restore active slide
  goTo(cur);
  st.textContent = `${allSlides.length} slides downloaded`;
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'||e.target.isContentEditable)return;
  if(e.key==='ArrowRight')mv(1);if(e.key==='ArrowLeft')mv(-1);
});
